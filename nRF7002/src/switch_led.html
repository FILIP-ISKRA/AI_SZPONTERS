<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>nRF LED Control</title>
  <style>
    :root { --bg:#07111f; --card:#0f2039; --ok:#2ec27e; --off:#9aa7ba; --txt:#edf2ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
      font-family:"Trebuchet MS","Segoe UI",sans-serif; color:var(--txt);
      background:radial-gradient(circle at 20% 20%, #16406f 0%, #07111f 55%); }
    .panel { width:min(760px,100%); background:linear-gradient(160deg,#112747,#0a1529);
      border:1px solid #335077; border-radius:18px; padding:20px;
      box-shadow:0 18px 42px rgba(0,0,0,0.35); }
    h1 { margin:0 0 6px; font-size:1.6rem; }
    p { margin:0 0 16px; color:#c7d4e7; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
    .led { border:1px solid #2e4567; border-radius:12px; padding:14px; background:var(--card); }
    .row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .badge { font-size:0.8rem; font-weight:700; letter-spacing:.04em; padding:4px 8px; border-radius:999px;
      background:#253b58; color:#cfe2ff; }
    .badge.on { background:rgba(46,194,126,.2); color:#8ef0c0; }
    .actions { display:flex; gap:8px; }
    button { border:0; border-radius:10px; padding:8px 12px; font-weight:700; cursor:pointer; }
    button.on { background:var(--ok); color:#062412; }
    button.off { background:var(--off); color:#0f1a28; }
    #status { margin-top:14px; font-size:0.9rem; color:#c7d4e7; }
  </style>
</head>
<body>
  <section class="panel">
    <h1>nRF HTTP LED Control</h1>
    <p>Use buttons below to control LED1 and LED2 through REST endpoints.</p>
    <div class="grid">
      <article class="led">
        <div class="row"><strong>LED1</strong><span id="b1" class="badge">OFF</span></div>
        <div class="actions"><button class="on" onclick="setLed(1,1)">ON</button><button class="off" onclick="setLed(1,0)">OFF</button></div>
      </article>
      <article class="led">
        <div class="row"><strong>LED2</strong><span id="b2" class="badge">OFF</span></div>
        <div class="actions"><button class="on" onclick="setLed(2,1)">ON</button><button class="off" onclick="setLed(2,0)">OFF</button></div>
      </article>
    </div>
    <div id="status">Ready.</div>
  </section>
  <script>
    function mark(id, val) {
      const el = document.getElementById("b" + id);
      const on = String(val).trim() === "1";
      el.textContent = on ? "ON" : "OFF";
      el.className = on ? "badge on" : "badge";
    }

    async function refresh() {
      try {
        const r1 = await fetch("/led/1");
        const r2 = await fetch("/led/2");
        mark(1, await r1.text());
        mark(2, await r2.text());
      } catch (_e) {
        document.getElementById("status").textContent = "Refresh failed";
      }
    }

    async function setLed(id, value) {
      document.getElementById("status").textContent = "Sending command...";
      try {
        const r = await fetch("/led/" + id, { method: "PUT", body: String(value) });
        if (!r.ok) {
          throw new Error("HTTP " + r.status);
        }
        document.getElementById("status").textContent = "LED" + id + " set to " + value;
        await refresh();
      } catch (_e) {
        document.getElementById("status").textContent = "Command failed";
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
